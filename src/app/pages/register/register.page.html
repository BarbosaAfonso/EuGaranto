<ion-header class="ion-no-border">
  <ion-toolbar class="transparent-toolbar">
    <ion-buttons slot="start">
      <ion-button (click)="irParaLogin()" class="btn-back">
        <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="register-content" fullscreen>
  <div class="register-wrapper">

    <div class="logo-area">
      <div class="logo-icon">
        <ion-icon name="person-add-outline"></ion-icon>
      </div>
      <h1 class="app-title">EuGaranto</h1>
      <p class="app-subtitle">Cria a tua conta em menos de 1 minuto</p>
    </div>

    <div class="form-card">
      <h2>Registara nova conta</h2>

      <div class="field-group">
        <ion-input 
          [(ngModel)]="nome"
          type="text" 
          label="NOME COMPLETO" 
          label-placement="stacked" 
          fill="outline" 
          placeholder="Insere o teu nome"
          class="custom-input">
          <ion-icon name="person-outline" slot="start"></ion-icon>
        </ion-input>
      </div>

      <div class="field-group">
        <ion-input 
          [(ngModel)]="email"
          type="email" 
          label="EMAIL" 
          label-placement="stacked" 
          fill="outline" 
          placeholder="alberto@exemplo.pt"
          class="custom-input">
          <ion-icon name="mail-outline" slot="start"></ion-icon>
        </ion-input>
      </div>

      <div class="field-group">
        <ion-input 
          [(ngModel)]="password"
          type="password" 
          label="PALAVRA-PASSE" 
          label-placement="stacked" 
          fill="outline" 
          placeholder="Pelo menos 6 caracteres"
          class="custom-input">
          <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
          <ion-input-password-toggle slot="end"></ion-input-password-toggle>
        </ion-input>
      </div>

      <ion-button expand="block" class="btn-register" color="success" (click)="criarConta()">
        Criar conta grátis
      </ion-button>

      <p class="login-text">
        Já tens conta? <span class="login-link" (click)="irParaLogin()">Entrar na conta</span>
      </p>
    </div>

  </div>
</ion-content>
