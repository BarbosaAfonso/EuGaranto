<ion-content class="login-content" fullscreen>
  <div class="login-wrapper">

    <div class="logo-area">
      <div class="logo-icon">
        <ion-icon name="shield-checkmark"></ion-icon>
      </div>
      <h1 class="app-title">EuGaranto</h1>
      <p class="app-subtitle">O teu gestor de garantias inteligente</p>
      <div class="feature-pills">
        <span class="pill"><ion-icon name="camera-outline"></ion-icon> OCR automático</span>
        <span class="pill"><ion-icon name="notifications-outline"></ion-icon> Alertas</span>
        <span class="pill"><ion-icon name="folder-outline"></ion-icon> Categorias</span>
      </div>
    </div>

    <div class="form-card">
      <h2>Entrar na conta</h2>

      <form [formGroup]="loginForm" (ngSubmit)="onLogin()">

        <div class="field-group">
          <ion-input 
            formControlName="email" 
            type="email" 
            label="EMAIL" 
            label-placement="stacked" 
            fill="outline" 
            placeholder="alberto@exemplo.pt"
            class="custom-input">
          </ion-input>
        </div>

        <div class="field-group">
          <ion-input 
            formControlName="password" 
            type="password" 
            label="PALAVRA-PASSE" 
            label-placement="stacked" 
            fill="outline" 
            placeholder="••••••••"
            class="custom-input">
            <ion-input-password-toggle slot="end"></ion-input-password-toggle>
          </ion-input>
        </div>

        <div class="forgot-row">
          <span class="forgot-link" (click)="openForgotPassword()">Esqueceste a palavra-passe?</span>
        </div>

        <div class="error-message" *ngIf="loginError">
          <ion-icon name="alert-circle-outline"></ion-icon>
          {{ loginError }}
        </div>

        <ion-button expand="block" class="btn-login" type="submit" color="success"
                    [disabled]="loginForm.invalid || loading">
          <ion-spinner *ngIf="loading" name="crescent" slot="start"></ion-spinner>
          Entrar
        </ion-button>

      </form>

      <div class="divider"><span>ou</span></div>

      <ion-button expand="block" fill="outline" class="btn-google" (click)="loginWithGoogle()">
        <ion-icon name="logo-google" slot="start"></ion-icon>
        Continuar com Google
      </ion-button>

      <p class="register-text">
        Não tens conta? <span class="register-link" (click)="goToRegister()">Criar conta grátis</span>
      </p>
    </div>

  </div>
</ion-content>
