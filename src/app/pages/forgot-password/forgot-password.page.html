<ion-content class="forgot-content">
  <div class="forgot-wrapper">

    <div class="modal-header">
      <div class="logo-icon">
        <ion-icon name="shield-checkmark"></ion-icon>
      </div>
      <h2>Recuperar palavra-passe</h2>
      <p *ngIf="step === 1">Indica o teu email e verificamos se existe uma conta.</p>
      <p *ngIf="step === 2">Define a tua nova palavra-passe para <strong>{{ verifiedEmail }}</strong>.</p>
    </div>

    <!-- PASSO 1: Email -->
    <div *ngIf="step === 1">
      <form [formGroup]="emailForm" (ngSubmit)="verifyEmail()">

        <div class="field-group">
          <ion-input
            formControlName="email"
            type="email"
            label="EMAIL"
            label-placement="stacked"
            fill="outline"
            placeholder="alberto@exemplo.pt"
            class="custom-input">
          </ion-input>
        </div>

        <div class="error-message" *ngIf="emailError">
          <ion-icon name="alert-circle-outline"></ion-icon>
          {{ emailError }}
        </div>

        <ion-button expand="block" class="btn-confirm" type="submit"
                    color="success" [disabled]="emailForm.invalid">
          Verificar email
        </ion-button>

        <ion-button expand="block" fill="outline" class="btn-cancel"
                    (click)="cancel()">
          Cancelar
        </ion-button>

      </form>
    </div>

    <!-- PASSO 2: Nova palavra-passe -->
    <div *ngIf="step === 2">
      <form [formGroup]="passwordForm" (ngSubmit)="confirmReset()">

        <div class="field-group">
          <ion-input
            formControlName="newPassword"
            type="password"
            label="NOVA PALAVRA-PASSE"
            label-placement="stacked"
            fill="outline"
            placeholder="••••••••"
            class="custom-input">
            <ion-input-password-toggle slot="end"></ion-input-password-toggle>
          </ion-input>
        </div>

        <div class="field-group">
          <ion-input
            formControlName="confirmPassword"
            type="password"
            label="CONFIRMAR PALAVRA-PASSE"
            label-placement="stacked"
            fill="outline"
            placeholder="••••••••"
            class="custom-input">
            <ion-input-password-toggle slot="end"></ion-input-password-toggle>
          </ion-input>
        </div>

        <div class="error-message" *ngIf="passwordError">
          <ion-icon name="alert-circle-outline"></ion-icon>
          {{ passwordError }}
        </div>

        <ion-button expand="block" class="btn-confirm" type="submit"
                    color="success" [disabled]="passwordForm.invalid">
          Confirmar
        </ion-button>

        <ion-button expand="block" fill="outline" class="btn-cancel"
                    (click)="cancel()">
          Cancelar
        </ion-button>

      </form>
    </div>

  </div>
</ion-content>
