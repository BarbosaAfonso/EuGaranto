<ion-header class="ion-no-border">
  <ion-toolbar><ion-title>Alertas</ion-title></ion-toolbar>
</ion-header>

<ion-content class="alerts-content">
  <div class="section-tag">SEQUÊNCIA DE ALERTAS</div>

  <ion-card class="alert-card" *ngFor="let a of alerts" [class.new-alert]="a.isNew">
    <ion-card-content>
      <div class="alert-top">
        <span class="new-badge" *ngIf="a.isNew">NOVO</span>
        <span class="days-badge" [class.urgent]="a.daysBefore <= 7">
          {{ a.daysBefore }} DIAS ANTES
        </span>
      </div>
      <div class="alert-main">
        <div class="alert-details">
          <strong>{{ a.message || 'Alerta padrão' }}</strong>
          <small>{{ formatDate(a.triggerDate) }} · {{ a.productName }}</small>
        </div>
        <ion-toggle [(ngModel)]="a.enabled" (ionChange)="toggleAlert(a)" color="success"></ion-toggle>
      </div>
    </ion-card-content>
  </ion-card>

  <div class="empty-state" *ngIf="alerts.length === 0">
    <ion-icon name="notifications-off-outline"></ion-icon>
    <p>Nenhum alerta configurado</p>
    <small>Adicione alertas a partir do detalhe de uma garantia.</small>
  </div>
</ion-content>
