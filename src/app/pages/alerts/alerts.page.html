<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Alertas</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="alerts-content">
  <ng-container *ngIf="alertWarranties.length > 0; else emptyState">
    <ion-list class="alerts-list" lines="none">
      <ion-item
        *ngFor="let item of alertWarranties; trackBy: trackByWarranty"
        class="alert-item"
      >
        <ion-icon
          slot="start"
          name="warning-outline"
          color="warning"
          aria-hidden="true"
        ></ion-icon>

        <ion-label>
          <h2>{{ getTitle(item.warranty) }}</h2>
          <ion-note>{{ item.warranty.category }}</ion-note>
          <p>Expira em {{ formatDate(item.warranty.endDate) }}</p>
        </ion-label>

        <ion-badge slot="end" [color]="getBadgeColor(item.daysRemaining)">
          {{ getBadgeText(item.daysRemaining) }}
        </ion-badge>
      </ion-item>
    </ion-list>
  </ng-container>

  <ng-template #emptyState>
    <div class="empty-state">
      <ion-icon name="checkmark-circle-outline" color="success"></ion-icon>
      <p>Tudo sob controlo!</p>
      <small>Nenhuma garantia expira nos próximos 30 dias.</small>
    </div>
  </ng-template>
</ion-content>
