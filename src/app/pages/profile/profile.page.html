<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="profile-content">
  <section class="profile-hero">
    <ion-avatar class="profile-avatar">
      <div class="avatar-core">SA</div>
    </ion-avatar>
    <h2>Sr. Alberto</h2>
    <p>alberto@exemplo.pt</p>
  </section>

  <ion-list inset="true" class="profile-list">
    <ion-item button="true" detail="true">
      <ion-icon slot="start" name="notifications-outline" color="success"></ion-icon>
      <ion-label>Notificações</ion-label>
    </ion-item>

    <ion-item button="true" detail="true">
      <ion-icon slot="start" name="shield-checkmark-outline" color="success"></ion-icon>
      <ion-label>Privacidade</ion-label>
    </ion-item>

    <ion-item button="true" detail="true">
      <ion-icon slot="start" name="help-circle-outline" color="success"></ion-icon>
      <ion-label>Ajuda</ion-label>
    </ion-item>
  </ion-list>

  <ion-list inset="true" class="logout-list">
    <ion-item button="true" detail="false" (click)="logout()">
      <ion-icon slot="start" name="log-out-outline" color="danger"></ion-icon>
      <ion-label color="danger">Terminar sessão</ion-label>
    </ion-item>
  </ion-list>
</ion-content>
