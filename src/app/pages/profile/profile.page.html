<ion-header class="ion-no-border">
  <ion-toolbar><ion-title>Perfil</ion-title></ion-toolbar>
</ion-header>

<ion-content class="profile-content">
  <div class="profile-header">
    <div class="avatar"><ion-icon name="person-outline"></ion-icon></div>
    <h2>Sr. Alberto</h2>
    <p>alberto@exemplo.pt</p>
  </div>

  <ion-list lines="inset" class="settings-list">
    <ion-item button>
      <ion-icon name="notifications-outline" slot="start" color="primary"></ion-icon>
      <ion-label>Notificações</ion-label>
    </ion-item>
    <ion-item button>
      <ion-icon name="shield-outline" slot="start" color="primary"></ion-icon>
      <ion-label>Privacidade</ion-label>
    </ion-item>
    <ion-item button>
      <ion-icon name="help-circle-outline" slot="start" color="primary"></ion-icon>
      <ion-label>Ajuda</ion-label>
    </ion-item>
    <ion-item button (click)="logout()">
      <ion-icon name="log-out-outline" slot="start" color="danger"></ion-icon>
      <ion-label color="danger">Terminar sessão</ion-label>
    </ion-item>
  </ion-list>
</ion-content>
