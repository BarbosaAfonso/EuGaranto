<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/home" text=""></ion-back-button>
    </ion-buttons>
    <ion-title class="page-title">Nova Garantia</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="page-shell">
    <div *ngIf="!isPhotoTaken" class="camera-prompt">
      <ion-icon name="camera-outline"></ion-icon>
      <h2>Fotografe a sua fatura</h2>
      <p>Capture ou escolha uma imagem para simular a extração automática dos dados.</p>
      <ion-button expand="block" color="success" (click)="takePhoto()">
        Fotografar Fatura
      </ion-button>
    </div>

    <div *ngIf="isPhotoTaken">
      <ion-card class="ocr-card">
        <ion-card-content>
          <img *ngIf="capturedImage" [src]="capturedImage" alt="Miniatura da fatura capturada">
          <ion-icon name="checkmark-circle" color="success"></ion-icon>
          <div>
            <strong>OCR EXTRAIU DADOS AUTOMATICAMENTE</strong>
            <p>Os campos abaixo já foram preparados e podem ser confirmados.</p>
          </div>
        </ion-card-content>
      </ion-card>

      <form [formGroup]="warrantyForm" (ngSubmit)="onSubmit()" class="warranty-form">
        <ion-input
          formControlName="productName"
          label="Produto"
          labelPlacement="stacked"
          fill="outline"
          placeholder="Nome do produto">
        </ion-input>

        <ion-input
          formControlName="purchaseDate"
          type="date"
          label="Data"
          labelPlacement="stacked"
          fill="outline">
        </ion-input>

        <ion-input
          formControlName="duration"
          label="Duração"
          labelPlacement="stacked"
          fill="outline"
          placeholder="Ex: 3 anos">
        </ion-input>

        <!-- ✅ interface="alert" tem scroll nativo e mostra todas as opções -->
        <ion-select
          formControlName="category"
          label="Categoria"
          labelPlacement="stacked"
          fill="outline"
          interface="alert"
          placeholder="Selecionar categoria">
          <ion-select-option *ngFor="let name of allCategoryNames" [value]="name">
            {{ name }}
          </ion-select-option>
        </ion-select>

        <ion-button type="submit" expand="block" color="success" [disabled]="warrantyForm.invalid">
          Confirmar e Avançar
        </ion-button>
      </form>
    </div>
  </div>
</ion-content>
